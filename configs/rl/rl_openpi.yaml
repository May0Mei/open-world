# DSRL RL fine-tuning: OpenPI (pi05_droid) base policy + VidWM world model.
#
# Algorithm: PixelSAC (jaxrl2) predicts diffusion noise → frozen OpenPI
# denoises to actions → VidWM simulates rollout → DummyReward for now.
#
# Reference implementation: /n/fs/not-fmrl/Projects/apple_project/dsrl_pi0
#
# Usage:
#   python scripts/run_rl_finetune.py --config configs/rl/rl_openpi.yaml
#
# The world-model checkpoint is downloaded by external/download_models.sh.
# The OpenPI checkpoint is fetched from GCS on first run (requires gcloud auth
# or a local copy at gs://openpi-assets/checkpoints/pi05_droid).

world_model:
  name: vidwm
  checkpoint_path: checkpoints/wm/checkpoint-120000.pt
  params:
    svd_model_path: external/stable-video-diffusion-img2vid
    clip_model_path: external/clip-vit-base-patch32
    num_frames: 5
    num_history: 6
    action_dim: 7
    width: 320
    height: 192
    # Use 4 inference steps (shortcut flow) for faster RL rollouts.
    num_inference_steps: 4
    flow_map_type: shortcut
    decode_to_rgb: true
    action_encoder_type: unaligned
    view_order: [exterior_right, exterior_left, wrist]
    decode_chunk_size: 7
    dtype: bfloat16

policy:
  name: dummy
  params:
    action_dim: 7
    seed: 42

reward_model:
  name: dummy
  params: {}

scheduler:
  chunk_size: 15  # must match train_params.action_horizon

train_params:
  seed: 42
  max_steps: 10000
  batch_size: 256
  resize_image: 128        # SAC pixel observation size
  action_horizon: 15       # must match pi05_droid action_horizon and scheduler.chunk_size
  noise_dim: 32            # pi05_droid internal action dim (SAC predicts noise in this space)
  max_chunks_per_episode: 5  # number of world-model rollouts per episode
  num_initial_trajs: 5     # random-noise rollouts before SAC starts updating
  multi_grad_step: 1       # SAC grad steps per env step
  discount: 0.99
  log_interval: 50
  checkpoint_interval: 500
  output_dir: outputs/rl_openpi
  encoder_type: resnet_small
  exterior_view_name: exterior_right
  instruction: "pick up the object"
  # dataset_path: data/benchmark/irom_test_carrot  # use real initializations (optional)
  # jaxrl2_parent: /n/fs/not-fmrl/Projects/apple_project/dsrl_pi0  # default path
